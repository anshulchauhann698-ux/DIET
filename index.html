<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Glow Up Tracker</title>
    <!-- Apple Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            background: linear-gradient(135deg, #0f172a 0%, #090d16 50%, #1e1b4b 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.07);
        }
        .glow-orange { filter: drop-shadow(0 0 8px rgba(249, 115, 22, 0.5)); }
        .glow-blue { filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5)); }
        .circle-progress { 
            transition: stroke-dashoffset 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        /* Custom scrollbar styling for logs */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-12 antialiased selection:bg-indigo-500/30">

    <!-- Header Navigation -->
    <header class="sticky top-0 z-50 px-6 pt-14 pb-4 bg-[#0f172a]/80 backdrop-blur-lg border-b border-slate-800/40 flex justify-between items-center">
        <div>
            <div class="flex items-center gap-2">
                <h1 class="text-2xl font-black tracking-tight bg-gradient-to-r from-orange-400 via-pink-400 to-blue-400 bg-clip-text text-transparent">MY GLOW UP</h1>
                <div class="bg-indigo-500/10 border border-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded-full text-[10px] font-bold tracking-wide flex items-center gap-1">
                    🔥 <span id="streakCount">0</span> Day Streak
                </div>
            </div>
            <p class="text-[10px] font-bold tracking-widest text-emerald-400 uppercase mt-0.5 flex items-center gap-1">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span> Pure Vegetarian Mode
            </p>
        </div>
        <button onclick="resetDayForce()" class="p-2.5 rounded-xl bg-slate-800/40 border border-slate-700/40 hover:bg-red-500/20 active:scale-95 transition text-sm">
            🗑️ Reset
        </button>
    </header>

    <!-- Main Tracker Dashboard -->
    <main class="max-w-md mx-auto p-5 space-y-6">
        
        <!-- Progress Rings Card Display -->
        <div class="grid grid-cols-2 gap-4">
            <!-- Protein Card -->
            <div class="glass-card p-5 rounded-3xl flex flex-col items-center text-center relative overflow-hidden group">
                <div class="w-28 h-28 relative mb-3 flex items-center justify-center">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" stroke="rgba(255,255,255,0.02)" stroke-width="8" fill="transparent"/>
                        <circle id="proteinRing" class="circle-progress stroke-orange-500" cx="50" cy="50" r="40" stroke-width="8" fill="transparent" 
                                stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round"/>
                    </svg>
                    <div class="absolute flex flex-col items-center">
                        <span class="text-2xl font-black text-white tracking-tight" id="proteinPct">0%</span>
                        <span class="text-[9px] uppercase tracking-wider text-orange-400 font-black">Protein</span>
                    </div>
                </div>
                <p class="text-xs font-medium text-slate-400"><span id="currProtein" class="text-xl font-black text-white tracking-tight">0</span> / 150g</p>
            </div>

            <!-- Water Card -->
            <div class="glass-card p-5 rounded-3xl flex flex-col items-center text-center relative overflow-hidden group">
                <div class="w-28 h-28 relative mb-3 flex items-center justify-center">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" stroke="rgba(255,255,255,0.02)" stroke-width="8" fill="transparent"/>
                        <circle id="waterRing" class="circle-progress stroke-blue-500" cx="50" cy="50" r="40" stroke-width="8" fill="transparent" 
                                stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round"/>
                    </svg>
                    <div class="absolute flex flex-col items-center">
                        <span class="text-2xl font-black text-white tracking-tight" id="waterPct">0%</span>
                        <span class="text-[9px] uppercase tracking-wider text-blue-400 font-black">Water</span>
                    </div>
                </div>
                <p class="text-xs font-medium text-slate-400"><span id="currWater" class="text-xl font-black text-white tracking-tight">0</span> / 4000ml</p>
            </div>
        </div>

        <!-- Log Quick Actions Section -->
        <div class="space-y-4">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Log Intake</h3>
            
            <div class="space-y-3">
                <!-- Water Counter Row -->
                <div class="glass-card p-3 rounded-2xl space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <div class="flex items-center gap-2">
                            <span class="text-lg">💧</span>
                            <span class="text-xs font-bold text-blue-400 uppercase tracking-wider">Water Intake</span>
                        </div>
                        <button onclick="promptCustomInput('water')" class="text-[11px] text-slate-400 hover:text-blue-400 font-medium">+ Custom</button>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="addWater(250)" class="bg-blue-600/10 hover:bg-blue-600/20 font-bold text-xs py-2.5 rounded-xl border border-blue-500/10 active:scale-95 transition text-blue-300">+250ml</button>
                        <button onclick="addWater(500)" class="bg-blue-600/10 hover:bg-blue-600/20 font-bold text-xs py-2.5 rounded-xl border border-blue-500/10 active:scale-95 transition text-blue-300">+500ml</button>
                        <button onclick="addWater(1000)" class="bg-blue-600/20 hover:bg-blue-600/30 text-blue-200 font-bold text-xs py-2.5 rounded-xl border border-blue-500/30 glow-blue active:scale-95 transition">⚡ +1L</button>
                    </div>
                </div>

                <!-- Protein Counter Row -->
                <div class="glass-card p-3 rounded-2xl space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <div class="flex items-center gap-2">
                            <span class="text-lg">💪</span>
                            <span class="text-xs font-bold text-orange-400 uppercase tracking-wider">Protein Intake</span>
                        </div>
                        <button onclick="promptCustomInput('protein')" class="text-[11px] text-slate-400 hover:text-orange-400 font-medium">+ Custom</button>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="addProtein(10)" class="bg-orange-600/10 hover:bg-orange-600/20 font-bold text-xs py-2.5 rounded-xl border border-orange-500/10 active:scale-95 transition text-orange-300">+10g</button>
                        <button onclick="addProtein(25)" class="bg-orange-600/10 hover:bg-orange-600/20 font-bold text-xs py-2.5 rounded-xl border border-orange-500/10 active:scale-95 transition text-orange-300">+25g</button>
                        <button onclick="addProtein(40)" class="bg-orange-600/20 hover:bg-orange-600/30 text-orange-200 font-bold text-xs py-2.5 rounded-xl border border-orange-500/30 glow-orange active:scale-95 transition">⚡ +40g</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Timeline Log History (New Feature) -->
        <div class="space-y-3">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Today's Timeline Log</h3>
            <div id="logHistoryContainer" class="glass-card rounded-2xl p-4 min-h-[100px] max-h-[180px] overflow-y-auto custom-scroll space-y-2 text-center flex flex-col justify-center">
                <!-- Content injected dynamically by JS -->
            </div>
        </div>

    </main>

    <script>
        const proteinGoal = 150;
        const waterGoal = 4000;
        const radius = 40;
        const circumference = 2 * Math.PI * radius;

        let currentDayData = {
            protein: 0,
            water: 0,
            history: [] // Holds {id, type, amount, time}
        };

        function checkDayTransition() {
            const todayStr = new Date().toISOString().split('T')[0];
            const storedDate = localStorage.getItem('activeDateStr');

            if (storedDate && storedDate !== todayStr) {
                // If the user hit targets yesterday, calculate streaks
                updateStreakData(storedDate);
                
                // Reset targets for the new day
                localStorage.setItem('protein', 0);
                localStorage.setItem('water', 0);
                localStorage.setItem('historyLogs', JSON.stringify([]));
            }
            localStorage.setItem('activeDateStr', todayStr);
            
            currentDayData.protein = parseFloat(localStorage.getItem('protein')) || 0;
            currentDayData.water = parseFloat(localStorage.getItem('water')) || 0;
            currentDayData.history = JSON.parse(localStorage.getItem('historyLogs')) || [];
            
            updateStreakUI();
        }

        function updateStreakData(lastActiveDate) {
            let streak = parseInt(localStorage.getItem('userStreak')) || 0;
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toISOString().split('T')[0];

            const lastProtein = parseFloat(localStorage.getItem('protein')) || 0;
            const lastWater = parseFloat(localStorage.getItem('water')) || 0;

            // Checked if yesterdays target targets were met
            if (lastProtein >= proteinGoal && lastWater >= waterGoal) {
                if (lastActiveDate === yesterdayStr) {
                    streak += 1;
                } else {
                    streak = 1; // Started over
                }
            } else {
                streak = 0; // Broke streak due to missing targets
            }
            localStorage.setItem('userStreak', streak);
        }

        function updateStreakUI() {
            const streak = localStorage.getItem('userStreak') || 0;
            document.getElementById('streakCount').innerText = streak;
        }

        function setProgress(elementId, current, goal, glowClass) {
            const circle = document.getElementById(elementId);
            const rawPercentage = (current / goal) * 100;
            const offset = circumference - (Math.min(rawPercentage, 100) / 100) * circumference;
            circle.style.strokeDashoffset = offset;
            
            // Toggle beautiful ring glowing effects when completing goals
            if (current >= goal) {
                circle.classList.add(glowClass);
            } else {
                circle.classList.remove(glowClass);
            }
        }

        function updateUI() {
            document.getElementById('currProtein').innerText = currentDayData.protein;
            document.getElementById('currWater').innerText = currentDayData.water;

            const proteinPercentage = Math.round((currentDayData.protein / proteinGoal) * 100);
            const waterPercentage = Math.round((currentDayData.water / waterGoal) * 100);

            document.getElementById('proteinPct').innerText = proteinPercentage + '%';
            document.getElementById('waterPct').innerText = waterPercentage + '%';

            setProgress('proteinRing', currentDayData.protein, proteinGoal, 'glow-orange');
            setProgress('waterRing', currentDayData.water, waterGoal, 'glow-blue');
            
            renderHistory();
        }

        function addLogItem(type, amount) {
            const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const item = {
                id: Date.now() + Math.random(),
                type: type,
                amount: amount,
                time: timeStr
            };
            currentDayData.history.unshift(item);
            localStorage.setItem('historyLogs', JSON.stringify(currentDayData.history));
        }

        function removeLogItem(id) {
            const itemIndex = currentDayData.history.findIndex(item => item.id === id);
            if (itemIndex !== -1) {
                const item = currentDayData.history[itemIndex];
                if (item.type === 'protein') {
                    currentDayData.protein = Math.max(0, currentDayData.protein - item.amount);
                    localStorage.setItem('protein', currentDayData.protein);
                } else {
                    currentDayData.water = Math.max(0, currentDayData.water - item.amount);
                    localStorage.setItem('water', currentDayData.water);
                }
                currentDayData.history.splice(itemIndex, 1);
                localStorage.setItem('historyLogs', JSON.stringify(currentDayData.history));
                updateUI();
            }
        }

        function addProtein(amount) {
            currentDayData.protein += amount;
            localStorage.setItem('protein', currentDayData.protein);
            addLogItem('protein', amount);
            updateUI();
        }

        function addWater(amount) {
            currentDayData.water += amount;
            localStorage.setItem('water', currentDayData.water);
            addLogItem('water', amount);
            updateUI();
        }

        function promptCustomInput(type) {
            const unit = type === 'protein' ? 'g' : 'ml';
            const value = prompt(`Enter custom ${type} amount (${unit}):`);
            const parsedValue = parseFloat(value);
            if (!isNaN(parsedValue) && parsedValue > 0) {
                if (type === 'protein') addProtein(parsedValue);
                if (type === 'water') addWater(parsedValue);
            }
        }

        function renderHistory() {
            const container = document.getElementById('logHistoryContainer');
            if (currentDayData.history.length === 0) {
                container.className = "glass-card rounded-2xl p-4 min-h-[100px] flex flex-col items-center justify-center text-center text-slate-500 text-xs italic";
                container.innerHTML = "No intakes logged yet today. Let's get building!";
                return;
            }
            
            container.className = "glass-card rounded-2xl p-3 max-h-[180px] overflow-y-auto custom-scroll space-y-2 text-left block";
            container.innerHTML = currentDayData.history.map(item => `
                <div class="flex justify-between items-center bg-white/5 border border-white/5 rounded-xl px-3 py-2 text-xs transition duration-150 hover:bg-white/10">
                    <div class="flex items-center gap-2">
                        <span>${item.type === 'protein' ? '💪' : '💧'}</span>
                        <div>
                            <span class="font-bold text-slate-200">${item.amount}${item.type === 'protein' ? 'g' : 'ml'}</span>
                            <span class="text-[10px] text-slate-400 font-medium lowercase">of ${item.type}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-slate-500 font-semibold">${item.time}</span>
                        <button onclick="removeLogItem(${item.id})" class="text-slate-400 hover:text-red-400 px-1 font-bold">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function resetDayForce() {
            if (confirm('Reset today\'s stats and entry logs to zero?')) {
                currentDayData.protein = 0;
                currentDayData.water = 0;
                currentDayData.history = [];
                localStorage.setItem('protein', 0);
                localStorage.setItem('water', 0);
                localStorage.setItem('historyLogs', JSON.stringify([]));
                updateUI();
            }
        }

        // Run boot workflow sequence
        checkDayTransition();
        updateUI();
    </script>
</body>
</html>
